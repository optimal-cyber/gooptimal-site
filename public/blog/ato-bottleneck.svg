<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3366;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ff3366;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#00ff88" stroke-width="0.5">
    <line x1="60" y1="0" x2="60" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Red glow (bottleneck) left side -->
  <circle cx="250" cy="315" r="200" fill="url(#redGlow)" filter="url(#blur1)"/>
  <!-- Green glow (solution) right side -->
  <circle cx="950" cy="315" r="200" fill="url(#greenGlow)" filter="url(#blur1)"/>

  <!-- ===== BOTTLENECK FUNNEL (center) ===== -->
  <g transform="translate(600, 200)">
    <!-- Wide top (many inputs) -->
    <path d="M-200,-80 L-200,-60 L-40,40 L-40,100 L40,100 L40,40 L200,-60 L200,-80 Z" fill="none" stroke="#ff3366" stroke-width="1.5" opacity="0.25"/>
    <path d="M-180,-70 L-180,-55 L-35,35 L-35,90 L35,90 L35,35 L180,-55 L180,-70 Z" fill="none" stroke="#ff3366" stroke-width="1" opacity="0.12"/>

    <!-- Items stuck in funnel (left side - slow/red) -->
    <g opacity="0.5">
      <!-- Documents stuck -->
      <rect x="-160" y="-65" width="35" height="12" rx="2" fill="#1a1215" stroke="#ff3366" stroke-width="0.5" opacity="0.6"/>
      <text x="-155" y="-56" font-family="monospace" font-size="5" fill="#ff3366" opacity="0.7">SSP</text>

      <rect x="-115" y="-60" width="35" height="12" rx="2" fill="#1a1215" stroke="#ff3366" stroke-width="0.5" opacity="0.6"/>
      <text x="-110" y="-51" font-family="monospace" font-size="5" fill="#ff3366" opacity="0.7">POA&amp;M</text>

      <rect x="-70" y="-50" width="35" height="12" rx="2" fill="#1a1215" stroke="#ffb800" stroke-width="0.5" opacity="0.6"/>
      <text x="-65" y="-41" font-family="monospace" font-size="5" fill="#ffb800" opacity="0.7">SCAN</text>

      <rect x="40" y="-55" width="35" height="12" rx="2" fill="#1a1215" stroke="#ff3366" stroke-width="0.5" opacity="0.6"/>
      <text x="45" y="-46" font-family="monospace" font-size="5" fill="#ff3366" opacity="0.7">CRM</text>

      <rect x="85" y="-62" width="35" height="12" rx="2" fill="#1a1215" stroke="#ffb800" stroke-width="0.5" opacity="0.6"/>
      <text x="90" y="-53" font-family="monospace" font-size="5" fill="#ffb800" opacity="0.7">STIG</text>

      <rect x="130" y="-58" width="35" height="12" rx="2" fill="#1a1215" stroke="#ff3366" stroke-width="0.5" opacity="0.6"/>
      <text x="135" y="-49" font-family="monospace" font-size="5" fill="#ff3366" opacity="0.7">SAR</text>

      <!-- More items in narrow part -->
      <rect x="-25" y="-20" width="28" height="10" rx="2" fill="#1a1215" stroke="#ff3366" stroke-width="0.5" opacity="0.5"/>
      <rect x="2" y="-10" width="28" height="10" rx="2" fill="#1a1215" stroke="#ffb800" stroke-width="0.5" opacity="0.5"/>
      <rect x="-15" y="5" width="28" height="10" rx="2" fill="#1a1215" stroke="#ff3366" stroke-width="0.5" opacity="0.4"/>
    </g>

    <!-- Arrow coming out bottom (slow drip) -->
    <g opacity="0.3">
      <line x1="0" y1="100" x2="0" y2="130" stroke="#ff3366" stroke-width="1" stroke-dasharray="4,4"/>
      <polygon points="-5,128 0,138 5,128" fill="#ff3366"/>
    </g>

    <!-- Time indicator -->
    <g transform="translate(0, 155)">
      <text x="0" y="0" font-family="monospace" font-size="10" fill="#ff3366" text-anchor="middle" opacity="0.5">12-18 MONTHS</text>
    </g>
  </g>

  <!-- ===== LEFT: Problem indicators ===== -->
  <g transform="translate(80, 120)">
    <!-- Manual process icons -->
    <rect x="0" y="0" width="160" height="90" rx="4" fill="#111318" stroke="#21262d" stroke-width="0.5" opacity="0.8"/>
    <text x="10" y="18" font-family="monospace" font-size="7" fill="#ff3366" opacity="0.6">MANUAL WORKFLOWS</text>
    <line x1="10" y1="24" x2="150" y2="24" stroke="#21262d" stroke-width="0.5"/>

    <g font-family="monospace" font-size="6" opacity="0.5">
      <text x="10" y="38" fill="#8b949e">Word docs............</text><text x="115" y="38" fill="#ff3366">SLOW</text>
      <text x="10" y="50" fill="#8b949e">Screenshots..........</text><text x="115" y="50" fill="#ff3366">STALE</text>
      <text x="10" y="62" fill="#8b949e">Spreadsheets.........</text><text x="115" y="62" fill="#ffb800">DRIFT</text>
      <text x="10" y="74" fill="#8b949e">Email chains.........</text><text x="115" y="74" fill="#ff3366">LOST</text>
    </g>
  </g>

  <g transform="translate(80, 400)">
    <rect x="0" y="0" width="160" height="70" rx="4" fill="#111318" stroke="#21262d" stroke-width="0.5" opacity="0.8"/>
    <text x="10" y="18" font-family="monospace" font-size="7" fill="#ffb800" opacity="0.6">COMPLIANCE THEATER</text>
    <line x1="10" y1="24" x2="150" y2="24" stroke="#21262d" stroke-width="0.5"/>
    <g font-family="monospace" font-size="6" opacity="0.5">
      <text x="10" y="38" fill="#8b949e">Checkbox mentality</text>
      <text x="10" y="50" fill="#8b949e">Good-looking packages</text>
      <text x="10" y="62" fill="#8b949e">Risk aversion &gt; risk mgmt</text>
    </g>
  </g>

  <!-- ===== RIGHT: Solution indicators ===== -->
  <g transform="translate(960, 120)">
    <rect x="0" y="0" width="160" height="90" rx="4" fill="#0a1a10" stroke="#00ff8830" stroke-width="0.5" opacity="0.8"/>
    <text x="10" y="18" font-family="monospace" font-size="7" fill="#00ff88" opacity="0.6">AUTOMATED EVIDENCE</text>
    <line x1="10" y1="24" x2="150" y2="24" stroke="#00ff8830" stroke-width="0.5"/>

    <g font-family="monospace" font-size="6" opacity="0.5">
      <text x="10" y="38" fill="#8b949e">CI/CD artifacts......</text><text x="115" y="38" fill="#00ff88">LIVE</text>
      <text x="10" y="50" fill="#8b949e">OSCAL output.........</text><text x="115" y="50" fill="#00ff88">AUTO</text>
      <text x="10" y="62" fill="#8b949e">Scan telemetry.......</text><text x="115" y="62" fill="#00ff88">CONT</text>
      <text x="10" y="74" fill="#8b949e">Config audits........</text><text x="115" y="74" fill="#00ff88">REAL</text>
    </g>
  </g>

  <g transform="translate(960, 400)">
    <rect x="0" y="0" width="160" height="70" rx="4" fill="#0a1a10" stroke="#00ff8830" stroke-width="0.5" opacity="0.8"/>
    <text x="10" y="18" font-family="monospace" font-size="7" fill="#00ff88" opacity="0.6">CONTINUOUS ATO</text>
    <line x1="10" y1="24" x2="150" y2="24" stroke="#00ff8830" stroke-width="0.5"/>
    <g font-family="monospace" font-size="6" opacity="0.5">
      <text x="10" y="38" fill="#8b949e">Secure-by-Design</text>
      <text x="10" y="50" fill="#8b949e">Live dashboards for AOs</text>
      <text x="10" y="62" fill="#8b949e">Risk-based decisions</text>
    </g>
  </g>

  <!-- ===== TITLE AREA ===== -->
  <text x="600" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">
    The ATO Bottleneck
  </text>
  <text x="600" y="590" font-family="monospace" font-size="14" fill="#9ca3af" text-anchor="middle" letter-spacing="1">
    Why Authorization Takes So Long and What Actually Fixes It
  </text>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#21262d" stroke-width="1" opacity="0.3"/>
</svg>
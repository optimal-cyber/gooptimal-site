<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="funnelFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3366;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ff3366;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="greenBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="redBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3366;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ff3366;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.06" stroke="#00ff88" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- ===== LEFT SIDE: Problem boxes ===== -->

  <!-- SSP Doc -->
  <g transform="translate(60, 60)">
    <rect width="200" height="100" rx="6" fill="url(#redBox)" stroke="#ff3366" stroke-width="1.5" opacity="0.9"/>
    <text x="15" y="28" font-family="monospace" font-size="13" font-weight="bold" fill="#ff3366">SSP DOCUMENT</text>
    <line x1="15" y1="38" x2="185" y2="38" stroke="#ff3366" stroke-width="0.5" opacity="0.4"/>
    <text x="15" y="55" font-family="monospace" font-size="10" fill="#8b949e">325+ controls</text>
    <text x="15" y="70" font-family="monospace" font-size="10" fill="#8b949e">500+ pages of narrative</text>
    <text x="15" y="85" font-family="monospace" font-size="10" fill="#ff6688">Stale on delivery</text>
  </g>

  <!-- Manual Evidence -->
  <g transform="translate(60, 190)">
    <rect width="200" height="100" rx="6" fill="url(#redBox)" stroke="#ff3366" stroke-width="1.5" opacity="0.9"/>
    <text x="15" y="28" font-family="monospace" font-size="13" font-weight="bold" fill="#ff3366">MANUAL EVIDENCE</text>
    <line x1="15" y1="38" x2="185" y2="38" stroke="#ff3366" stroke-width="0.5" opacity="0.4"/>
    <text x="15" y="55" font-family="monospace" font-size="10" fill="#8b949e">Screenshots</text>
    <text x="15" y="70" font-family="monospace" font-size="10" fill="#8b949e">PDF exports</text>
    <text x="15" y="85" font-family="monospace" font-size="10" fill="#ff6688">Weeks to collect</text>
  </g>

  <!-- Compliance Theater -->
  <g transform="translate(60, 320)">
    <rect width="200" height="100" rx="6" fill="url(#redBox)" stroke="#ffb800" stroke-width="1.5" opacity="0.9"/>
    <text x="15" y="28" font-family="monospace" font-size="13" font-weight="bold" fill="#ffb800">COMPLIANCE THEATER</text>
    <line x1="15" y1="38" x2="185" y2="38" stroke="#ffb800" stroke-width="0.5" opacity="0.4"/>
    <text x="15" y="55" font-family="monospace" font-size="10" fill="#8b949e">Checkbox mentality</text>
    <text x="15" y="70" font-family="monospace" font-size="10" fill="#8b949e">"Good-looking packages"</text>
    <text x="15" y="85" font-family="monospace" font-size="10" fill="#ffcc44">Risk aversion > risk mgmt</text>
  </g>

  <!-- ===== CENTER: Funnel ===== -->
  <g transform="translate(600, 50)">
    <!-- Funnel shape -->
    <path d="M-180,0 L180,0 L50,280 L50,380 L-50,380 L-50,280 Z" fill="url(#funnelFill)" stroke="#ff3366" stroke-width="2" opacity="0.8"/>

    <!-- Items inside funnel -->
    <g font-family="monospace" font-size="11" font-weight="bold">
      <rect x="-140" y="20" width="60" height="26" rx="4" fill="#1a1520" stroke="#ff3366" stroke-width="1"/>
      <text x="-128" y="38" fill="#ff6688">SSP</text>

      <rect x="-65" y="15" width="70" height="26" rx="4" fill="#1a1520" stroke="#ff3366" stroke-width="1"/>
      <text x="-52" y="33" fill="#ff6688">POA&amp;M</text>

      <rect x="20" y="20" width="60" height="26" rx="4" fill="#1a1520" stroke="#ffb800" stroke-width="1"/>
      <text x="32" y="38" fill="#ffcc44">SCAN</text>

      <rect x="95" y="18" width="55" height="26" rx="4" fill="#1a1520" stroke="#ff3366" stroke-width="1"/>
      <text x="107" y="36" fill="#ff6688">SAR</text>

      <rect x="-110" y="60" width="55" height="26" rx="4" fill="#1a1520" stroke="#ffb800" stroke-width="1"/>
      <text x="-98" y="78" fill="#ffcc44">STIG</text>

      <rect x="-40" y="55" width="55" height="26" rx="4" fill="#1a1520" stroke="#ff3366" stroke-width="1"/>
      <text x="-28" y="73" fill="#ff6688">CRM</text>

      <rect x="30" y="62" width="80" height="26" rx="4" fill="#1a1520" stroke="#ff3366" stroke-width="1"/>
      <text x="38" y="80" fill="#ff6688">CONMON</text>
    </g>

    <!-- Jam in narrow part -->
    <g opacity="0.6">
      <rect x="-30" y="160" width="25" height="18" rx="3" fill="#1a1520" stroke="#ff3366" stroke-width="1"/>
      <rect x="5" y="170" width="25" height="18" rx="3" fill="#1a1520" stroke="#ffb800" stroke-width="1"/>
      <rect x="-15" y="195" width="25" height="18" rx="3" fill="#1a1520" stroke="#ff3366" stroke-width="1"/>
      <rect x="12" y="205" width="25" height="18" rx="3" fill="#1a1520" stroke="#ff3366" stroke-width="1"/>
    </g>

    <!-- Drip arrow -->
    <line x1="0" y1="385" x2="0" y2="430" stroke="#ff3366" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
    <polygon points="-8,425 0,440 8,425" fill="#ff3366" opacity="0.7"/>

    <!-- Time label -->
    <rect x="-80" y="450" width="160" height="36" rx="6" fill="#1a1215" stroke="#ff3366" stroke-width="1.5"/>
    <text x="0" y="473" font-family="monospace" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">12-18 MONTHS</text>
  </g>

  <!-- Arrows from left boxes to funnel -->
  <g stroke="#ff3366" stroke-width="1.5" opacity="0.4" fill="none">
    <path d="M260,110 Q350,110 420,120"/>
    <path d="M260,240 Q350,230 420,200"/>
    <path d="M260,370 Q350,350 420,280"/>
  </g>

  <!-- ===== RIGHT SIDE: Solution boxes ===== -->

  <!-- Automated Evidence -->
  <g transform="translate(940, 60)">
    <rect width="200" height="100" rx="6" fill="url(#greenBox)" stroke="#00ff88" stroke-width="1.5" opacity="0.9"/>
    <text x="15" y="28" font-family="monospace" font-size="13" font-weight="bold" fill="#00ff88">AUTO EVIDENCE</text>
    <line x1="15" y1="38" x2="185" y2="38" stroke="#00ff88" stroke-width="0.5" opacity="0.4"/>
    <text x="15" y="55" font-family="monospace" font-size="10" fill="#8b949e">CI/CD artifacts</text>
    <text x="170" y="55" font-family="monospace" font-size="10" fill="#00ff88" text-anchor="end">LIVE</text>
    <text x="15" y="70" font-family="monospace" font-size="10" fill="#8b949e">OSCAL output</text>
    <text x="170" y="70" font-family="monospace" font-size="10" fill="#00ff88" text-anchor="end">AUTO</text>
    <text x="15" y="85" font-family="monospace" font-size="10" fill="#8b949e">Scan telemetry</text>
    <text x="170" y="85" font-family="monospace" font-size="10" fill="#00ff88" text-anchor="end">CONT</text>
  </g>

  <!-- Secure by Design -->
  <g transform="translate(940, 190)">
    <rect width="200" height="100" rx="6" fill="url(#greenBox)" stroke="#00ff88" stroke-width="1.5" opacity="0.9"/>
    <text x="15" y="28" font-family="monospace" font-size="13" font-weight="bold" fill="#00ff88">SECURE BY DESIGN</text>
    <line x1="15" y1="38" x2="185" y2="38" stroke="#00ff88" stroke-width="0.5" opacity="0.4"/>
    <text x="15" y="55" font-family="monospace" font-size="10" fill="#8b949e">IaC = evidence</text>
    <text x="15" y="70" font-family="monospace" font-size="10" fill="#8b949e">Policy-as-code</text>
    <text x="15" y="85" font-family="monospace" font-size="10" fill="#8b949e">Hardened baselines</text>
  </g>

  <!-- Continuous ATO -->
  <g transform="translate(940, 320)">
    <rect width="200" height="100" rx="6" fill="url(#greenBox)" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
    <text x="15" y="28" font-family="monospace" font-size="13" font-weight="bold" fill="#00d4ff">CONTINUOUS ATO</text>
    <line x1="15" y1="38" x2="185" y2="38" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
    <text x="15" y="55" font-family="monospace" font-size="10" fill="#8b949e">Live dashboards</text>
    <text x="15" y="70" font-family="monospace" font-size="10" fill="#8b949e">Real-time posture</text>
    <text x="15" y="85" font-family="monospace" font-size="10" fill="#00d4ff">AO decides in minutes</text>
  </g>

  <!-- Arrows from funnel to right boxes -->
  <g stroke="#00ff88" stroke-width="1.5" opacity="0.4" fill="none">
    <path d="M780,120 Q860,110 940,110"/>
    <path d="M780,200 Q860,230 940,240"/>
    <path d="M780,280 Q860,340 940,370"/>
  </g>

  <!-- VS label in center -->
  <g transform="translate(600, 530)">
    <rect x="-170" y="-20" width="140" height="34" rx="6" fill="#1a1215" stroke="#ff3366" stroke-width="1"/>
    <text x="-100" y="4" font-family="monospace" font-size="14" font-weight="bold" fill="#ff3366" text-anchor="middle">THE PROBLEM</text>

    <rect x="30" y="-20" width="140" height="34" rx="6" fill="#0a1a10" stroke="#00ff88" stroke-width="1"/>
    <text x="100" y="4" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff88" text-anchor="middle">THE FIX</text>
  </g>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#21262d" stroke-width="1"/>
</svg>
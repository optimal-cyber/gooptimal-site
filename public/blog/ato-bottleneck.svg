<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- ===== COLUMN 1: TODAY (Red/Problem) ===== -->

  <!-- Column header -->
  <rect x="40" y="30" width="320" height="44" rx="6" fill="#1a1215" stroke="#ff3366" stroke-width="1.5"/>
  <text x="200" y="58" font-family="monospace" font-size="18" font-weight="bold" fill="#ff3366" text-anchor="middle">TODAY'S ATO PROCESS</text>

  <!-- Box 1: Documentation -->
  <rect x="40" y="100" width="320" height="110" rx="6" fill="#120f14" stroke="#ff3366" stroke-width="1.2"/>
  <text x="60" y="128" font-family="monospace" font-size="14" font-weight="bold" fill="#ff3366">Documentation Overload</text>
  <text x="60" y="152" font-family="monospace" font-size="11" fill="#9ca3af">500+ page SSPs written from memory</text>
  <text x="60" y="170" font-family="monospace" font-size="11" fill="#9ca3af">Outdated before assessment begins</text>
  <text x="60" y="188" font-family="monospace" font-size="11" fill="#ff6688">Describes intent, not reality</text>

  <!-- Box 2: Manual Evidence -->
  <rect x="40" y="230" width="320" height="110" rx="6" fill="#120f14" stroke="#ff3366" stroke-width="1.2"/>
  <text x="60" y="258" font-family="monospace" font-size="14" font-weight="bold" fill="#ff3366">Manual Evidence Collection</text>
  <text x="60" y="282" font-family="monospace" font-size="11" fill="#9ca3af">Screenshots, PDFs, spreadsheets</text>
  <text x="60" y="300" font-family="monospace" font-size="11" fill="#9ca3af">Weeks of gathering per assessment</text>
  <text x="60" y="318" font-family="monospace" font-size="11" fill="#ff6688">Stale evidence = rework cycles</text>

  <!-- Box 3: Bottlenecks -->
  <rect x="40" y="360" width="320" height="110" rx="6" fill="#12100d" stroke="#ffb800" stroke-width="1.2"/>
  <text x="60" y="388" font-family="monospace" font-size="14" font-weight="bold" fill="#ffb800">Organizational Bottlenecks</text>
  <text x="60" y="412" font-family="monospace" font-size="11" fill="#9ca3af">AO queues, 3PAO backlogs</text>
  <text x="60" y="430" font-family="monospace" font-size="11" fill="#9ca3af">Compliance theater over risk mgmt</text>
  <text x="60" y="448" font-family="monospace" font-size="11" fill="#ffcc44">Calendar delays compound tech ones</text>

  <!-- Result badge -->
  <rect x="80" y="496" width="240" height="50" rx="8" fill="#1a1215" stroke="#ff3366" stroke-width="2"/>
  <text x="200" y="525" font-family="monospace" font-size="20" font-weight="bold" fill="#ff3366" text-anchor="middle">12-18 MONTHS</text>

  <!-- Down arrows connecting boxes -->
  <line x1="200" y1="210" x2="200" y2="230" stroke="#ff3366" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="340" x2="200" y2="360" stroke="#ff3366" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="470" x2="200" y2="496" stroke="#ff3366" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <polygon points="195,494 200,502 205,494" fill="#ff3366" opacity="0.5"/>

  <!-- ===== CENTER: Arrow / Transformation ===== -->

  <g transform="translate(600, 290)">
    <!-- Large arrow -->
    <line x1="-170" y1="0" x2="130" y2="0" stroke="#21262d" stroke-width="2"/>
    <polygon points="130,-12 155,0 130,12" fill="#21262d"/>

    <!-- Glow overlay arrow -->
    <line x1="-170" y1="0" x2="130" y2="0" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
    <polygon points="130,-10 152,0 130,10" fill="#00ff88" opacity="0.3"/>

    <text x="-20" y="-20" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">WHAT CHANGES</text>
  </g>

  <!-- ===== COLUMN 2: FUTURE (Green/Solution) ===== -->

  <!-- Column header -->
  <rect x="840" y="30" width="320" height="44" rx="6" fill="#0a1a10" stroke="#00ff88" stroke-width="1.5"/>
  <text x="1000" y="58" font-family="monospace" font-size="18" font-weight="bold" fill="#00ff88" text-anchor="middle">THE PATH FORWARD</text>

  <!-- Box 1: Automated Evidence -->
  <rect x="840" y="100" width="320" height="110" rx="6" fill="#0c1410" stroke="#00ff88" stroke-width="1.2"/>
  <text x="860" y="128" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff88">Automated Evidence</text>
  <text x="860" y="152" font-family="monospace" font-size="11" fill="#9ca3af">CI/CD artifacts as proof</text>
  <text x="1140" y="152" font-family="monospace" font-size="11" fill="#00ff88" text-anchor="end">LIVE</text>
  <text x="860" y="170" font-family="monospace" font-size="11" fill="#9ca3af">OSCAL machine-readable output</text>
  <text x="1140" y="170" font-family="monospace" font-size="11" fill="#00ff88" text-anchor="end">AUTO</text>
  <text x="860" y="188" font-family="monospace" font-size="11" fill="#9ca3af">Continuous scan telemetry</text>
  <text x="1140" y="188" font-family="monospace" font-size="11" fill="#00ff88" text-anchor="end">REAL</text>

  <!-- Box 2: Secure by Design -->
  <rect x="840" y="230" width="320" height="110" rx="6" fill="#0c1410" stroke="#00ff88" stroke-width="1.2"/>
  <text x="860" y="258" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff88">Secure-by-Design</text>
  <text x="860" y="282" font-family="monospace" font-size="11" fill="#9ca3af">Infrastructure as Code = evidence</text>
  <text x="860" y="300" font-family="monospace" font-size="11" fill="#9ca3af">Policy-as-code guardrails</text>
  <text x="860" y="318" font-family="monospace" font-size="11" fill="#9ca3af">STIG-hardened from day one</text>

  <!-- Box 3: Continuous ATO -->
  <rect x="840" y="360" width="320" height="110" rx="6" fill="#0c1214" stroke="#00d4ff" stroke-width="1.2"/>
  <text x="860" y="388" font-family="monospace" font-size="14" font-weight="bold" fill="#00d4ff">Continuous ATO</text>
  <text x="860" y="412" font-family="monospace" font-size="11" fill="#9ca3af">Live dashboards for the AO</text>
  <text x="860" y="430" font-family="monospace" font-size="11" fill="#9ca3af">Real-time security posture</text>
  <text x="860" y="448" font-family="monospace" font-size="11" fill="#00d4ff">Risk decisions in minutes, not months</text>

  <!-- Result badge -->
  <rect x="880" y="496" width="240" height="50" rx="8" fill="#0a1a10" stroke="#00ff88" stroke-width="2"/>
  <text x="1000" y="525" font-family="monospace" font-size="20" font-weight="bold" fill="#00ff88" text-anchor="middle">WEEKS, NOT MONTHS</text>

  <!-- Down arrows connecting boxes -->
  <line x1="1000" y1="210" x2="1000" y2="230" stroke="#00ff88" stroke-width="1.5" opacity="0.4"/>
  <line x1="1000" y1="340" x2="1000" y2="360" stroke="#00ff88" stroke-width="1.5" opacity="0.4"/>
  <line x1="1000" y1="470" x2="1000" y2="496" stroke="#00ff88" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <polygon points="995,494 1000,502 1005,494" fill="#00ff88" opacity="0.5"/>

  <!-- ===== BOTTOM LABEL ===== -->
  <text x="600" y="600" font-family="monospace" font-size="12" fill="#4a5568" text-anchor="middle" letter-spacing="2">THE ATO BOTTLENECK: RETHINKING AUTHORIZATION</text>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#21262d" stroke-width="1"/>
</svg>
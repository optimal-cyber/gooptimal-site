<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00cc6a;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb800;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0.02"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(60,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(120,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(180,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(240,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(360,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(420,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(480,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(540,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(660,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(720,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(780,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(840,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(960,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(1020,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(1080,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ff88" stroke-width="0.5" transform="translate(1140,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff88" stroke-width="0.5" transform="translate(0,60)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff88" stroke-width="0.5" transform="translate(0,120)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff88" stroke-width="0.5" transform="translate(0,180)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff88" stroke-width="0.5" transform="translate(0,240)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff88" stroke-width="0.5" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff88" stroke-width="0.5" transform="translate(0,360)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff88" stroke-width="0.5" transform="translate(0,420)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff88" stroke-width="0.5" transform="translate(0,480)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ff88" stroke-width="0.5" transform="translate(0,540)"/>
  </g>

  <!-- Ambient glow blobs -->
  <circle cx="300" cy="250" r="200" fill="url(#greenGlow)" filter="url(#blur1)"/>
  <circle cx="900" cy="380" r="180" fill="url(#amberGlow)" filter="url(#blur1)"/>

  <!-- Shield icon (representing FedRAMP/security) -->
  <g transform="translate(600, 200)" filter="url(#glow)">
    <!-- Outer shield -->
    <path d="M0,-100 L70,-70 L70,20 Q70,80 0,110 Q-70,80 -70,20 L-70,-70 Z" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
    <!-- Inner shield -->
    <path d="M0,-75 L52,-52 L52,15 Q52,60 0,82 Q-52,60 -52,15 L-52,-52 Z" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.15"/>
    <!-- Checkmark morphing into question mark concept - using a forward arrow/progress symbol -->
    <g opacity="0.5">
      <!-- Arrow pointing right (progress) -->
      <line x1="-25" y1="0" x2="15" y2="0" stroke="#ffb800" stroke-width="3" stroke-linecap="round"/>
      <polyline points="5,-12 17,0 5,12" fill="none" stroke="#ffb800" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Decorative circuit-like lines -->
  <g opacity="0.08" stroke="#00ff88" stroke-width="1">
    <!-- Left side circuits -->
    <path d="M100,315 L200,315 L200,280 L280,280" fill="none"/>
    <circle cx="280" cy="280" r="3" fill="#00ff88"/>
    <path d="M100,350 L180,350 L180,390 L260,390" fill="none"/>
    <circle cx="260" cy="390" r="3" fill="#00ff88"/>
    <!-- Right side circuits -->
    <path d="M1100,315 L1000,315 L1000,280 L920,280" fill="none"/>
    <circle cx="920" cy="280" r="3" fill="#00ff88"/>
    <path d="M1100,350 L1020,350 L1020,390 L940,390" fill="none"/>
    <circle cx="940" cy="390" r="3" fill="#00ff88"/>
  </g>

  <!-- "20x" large text -->
  <text x="600" y="345" font-family="monospace" font-size="120" font-weight="bold" fill="#00ff88" opacity="0.08" text-anchor="middle" letter-spacing="8">20x</text>

  <!-- Main title -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">
    FedRAMP 20x
  </text>

  <!-- Subtitle -->
  <text x="600" y="465" font-family="monospace" font-size="16" fill="#9ca3af" text-anchor="middle" letter-spacing="1">
    A Step Forward on Paper. A Marathon in Practice.
  </text>

  <!-- Divider line -->
  <line x1="500" y1="490" x2="700" y2="490" stroke="#21262d" stroke-width="1"/>

  <!-- Tags -->
  <g font-family="monospace" font-size="11" letter-spacing="1">
    <rect x="390" y="510" width="70" height="24" rx="4" fill="#ffb800" fill-opacity="0.1" stroke="#ffb800" stroke-opacity="0.2" stroke-width="1"/>
    <text x="425" y="526" fill="#ffb800" text-anchor="middle">DISA</text>

    <rect x="475" y="510" width="60" height="24" rx="4" fill="#00ff88" fill-opacity="0.1" stroke="#00ff88" stroke-opacity="0.2" stroke-width="1"/>
    <text x="505" y="526" fill="#00ff88" text-anchor="middle">DoD</text>

    <rect x="550" y="510" width="100" height="24" rx="4" fill="#00d4ff" fill-opacity="0.1" stroke="#00d4ff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="600" y="526" fill="#00d4ff" text-anchor="middle">FedRAMP</text>

    <rect x="665" y="510" width="60" height="24" rx="4" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1"/>
    <text x="695" y="526" fill="#a855f7" text-anchor="middle">3PAO</text>

    <rect x="740" y="510" width="70" height="24" rx="4" fill="#00ff88" fill-opacity="0.1" stroke="#00ff88" stroke-opacity="0.2" stroke-width="1"/>
    <text x="775" y="526" fill="#00ff88" text-anchor="middle">Cloud</text>
  </g>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#21262d" stroke-width="1" opacity="0.5"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/><stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- ===== AUTHORIZATION BOUNDARY ===== -->
  <rect x="308" y="55" width="862" height="430" rx="8" fill="none" stroke="#00ff88" stroke-width="2" stroke-dasharray="10,5" opacity="0.35"/>
  <text x="328" y="78" font-family="monospace" font-size="12" fill="#00ff88" opacity="0.6" font-weight="bold">INSIDE AUTHORIZATION BOUNDARY</text>
  <text x="130" y="78" font-family="monospace" font-size="12" fill="#ff3366" opacity="0.6" text-anchor="middle" font-weight="bold">OUTSIDE</text>

  <!-- ===== STAGE 1: SOURCE ===== -->
  <g transform="translate(40, 120)">
    <rect width="220" height="160" rx="10" fill="#120f14" stroke="#ff3366" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="44" rx="10" fill="#1a1215"/>
    <rect x="0" y="28" width="220" height="16" fill="#1a1215"/>
    <text x="110" y="30" font-family="monospace" font-size="16" font-weight="bold" fill="#ff3366" text-anchor="middle">SOURCE</text>

    <text x="110" y="72" font-family="sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">GitHub / GitLab</text>
    <text x="110" y="96" font-family="sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Code Repository + CI Runner</text>

    <line x1="20" y1="112" x2="200" y2="112" stroke="#21262d" stroke-width="1"/>

    <text x="110" y="136" font-family="monospace" font-size="12" fill="#ff6688" text-anchor="middle">Not FedRAMP Authorized</text>
    <text x="110" y="152" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle">No federal data permitted</text>
  </g>

  <!-- ===== PULL ARROW ===== -->
  <g transform="translate(270, 195)">
    <rect x="-4" y="-16" width="60" height="32" rx="6" fill="#12100d" stroke="#ffb800" stroke-width="1.5"/>
    <text x="26" y="4" font-family="monospace" font-size="13" fill="#ffb800" text-anchor="middle" font-weight="bold">PULL</text>
    <text x="26" y="28" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">TLS 443 / FIPS</text>
  </g>

  <!-- ===== STAGE 2: BUILD + SCAN ===== -->
  <g transform="translate(340, 100)">
    <rect width="280" height="200" rx="10" fill="#0c1410" stroke="#00ff88" stroke-width="2"/>
    <rect x="0" y="0" width="280" height="44" rx="10" fill="#0a1a10"/>
    <rect x="0" y="28" width="280" height="16" fill="#0a1a10"/>
    <text x="140" y="30" font-family="monospace" font-size="16" font-weight="bold" fill="#00ff88" text-anchor="middle">BUILD + SCAN</text>

    <text x="140" y="68" font-family="sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">Dev/Test Environment</text>

    <!-- Scan tool boxes - 2 rows of 3 -->
    <rect x="16" y="84" width="78" height="36" rx="5" fill="#111318" stroke="#00ff88" stroke-width="1"/>
    <text x="55" y="106" font-family="monospace" font-size="13" fill="#00ff88" text-anchor="middle" font-weight="bold">SAST</text>

    <rect x="101" y="84" width="78" height="36" rx="5" fill="#111318" stroke="#00ff88" stroke-width="1"/>
    <text x="140" y="106" font-family="monospace" font-size="13" fill="#00ff88" text-anchor="middle" font-weight="bold">DAST</text>

    <rect x="186" y="84" width="78" height="36" rx="5" fill="#111318" stroke="#00ff88" stroke-width="1"/>
    <text x="225" y="106" font-family="monospace" font-size="13" fill="#00ff88" text-anchor="middle" font-weight="bold">SCA</text>

    <rect x="16" y="128" width="78" height="36" rx="5" fill="#111318" stroke="#00d4ff" stroke-width="1"/>
    <text x="55" y="150" font-family="monospace" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="bold">SBOM</text>

    <rect x="101" y="128" width="78" height="36" rx="5" fill="#111318" stroke="#ffb800" stroke-width="1"/>
    <text x="140" y="150" font-family="monospace" font-size="12" fill="#ffb800" text-anchor="middle" font-weight="bold">SECRETS</text>

    <rect x="186" y="128" width="78" height="36" rx="5" fill="#111318" stroke="#00d4ff" stroke-width="1"/>
    <text x="225" y="150" font-family="monospace" font-size="12" fill="#00d4ff" text-anchor="middle" font-weight="bold">IMAGE</text>

    <!-- Pass/fail line -->
    <line x1="16" y1="178" x2="264" y2="178" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
    <text x="140" y="194" font-family="monospace" font-size="11" fill="#00ff88" text-anchor="middle">PASS / FAIL GATE</text>
  </g>

  <!-- ===== ARROW: Build to Gate ===== -->
  <g>
    <line x1="630" y1="200" x2="680" y2="200" stroke="#ffb800" stroke-width="2"/>
    <polygon points="678,194 690,200 678,206" fill="#ffb800"/>
  </g>

  <!-- ===== STAGE 3: MANUAL GATE ===== -->
  <g transform="translate(695, 140)">
    <rect width="140" height="120" rx="10" fill="#12100d" stroke="#ffb800" stroke-width="2.5"/>
    <text x="70" y="40" font-family="monospace" font-size="14" font-weight="bold" fill="#ffb800" text-anchor="middle">MANUAL</text>
    <text x="70" y="60" font-family="monospace" font-size="14" font-weight="bold" fill="#ffb800" text-anchor="middle">GATE</text>

    <line x1="20" y1="74" x2="120" y2="74" stroke="#ffb800" stroke-width="0.5" opacity="0.4"/>

    <text x="70" y="94" font-family="sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Human Approval</text>
    <text x="70" y="112" font-family="sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">SIA Verified</text>
  </g>

  <!-- ===== ARROW: Gate to Prod ===== -->
  <g>
    <line x1="845" y1="200" x2="895" y2="200" stroke="#00d4ff" stroke-width="2"/>
    <polygon points="893,194 905,200 893,206" fill="#00d4ff"/>
  </g>

  <!-- ===== STAGE 4: PRODUCTION ===== -->
  <g transform="translate(910, 120)">
    <rect width="240" height="160" rx="10" fill="#0c1214" stroke="#00d4ff" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="44" rx="10" fill="#0a1218"/>
    <rect x="0" y="28" width="240" height="16" fill="#0a1218"/>
    <text x="120" y="30" font-family="monospace" font-size="16" font-weight="bold" fill="#00d4ff" text-anchor="middle">PRODUCTION</text>

    <text x="120" y="72" font-family="sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">Operational Env</text>

    <line x1="20" y1="86" x2="220" y2="86" stroke="#21262d" stroke-width="1"/>

    <text x="120" y="108" font-family="sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Separation of duties enforced</text>
    <text x="120" y="128" font-family="sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Change control (CM-3)</text>
    <text x="120" y="148" font-family="sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Least privilege (AC-6)</text>
  </g>

  <!-- ===== ROLES / SEPARATION OF DUTIES BAR ===== -->
  <g transform="translate(40, 330)">
    <rect width="1120" height="80" rx="8" fill="#111318" stroke="#21262d" stroke-width="1"/>
    <text x="560" y="24" font-family="monospace" font-size="12" fill="#e5e7eb" text-anchor="middle" font-weight="bold">SEPARATION OF DUTIES</text>

    <!-- Developer -->
    <rect x="30" y="38" width="200" height="32" rx="5" fill="#120f14" stroke="#ff3366" stroke-width="1"/>
    <text x="130" y="58" font-family="sans-serif" font-size="13" fill="#ff3366" text-anchor="middle" font-weight="bold">Developer</text>
    <text x="130" y="62" font-family="sans-serif" font-size="9" fill="#ff3366" text-anchor="middle"></text>

    <text x="255" y="58" font-family="monospace" font-size="16" fill="#21262d" text-anchor="middle">&#8800;</text>

    <!-- Dev Approver -->
    <rect x="280" y="38" width="220" height="32" rx="5" fill="#12100d" stroke="#ffb800" stroke-width="1"/>
    <text x="390" y="58" font-family="sans-serif" font-size="13" fill="#ffb800" text-anchor="middle" font-weight="bold">Dev Approver</text>

    <text x="525" y="58" font-family="monospace" font-size="16" fill="#21262d" text-anchor="middle">&#8800;</text>

    <!-- Prod Approver -->
    <rect x="550" y="38" width="220" height="32" rx="5" fill="#0c1214" stroke="#00d4ff" stroke-width="1"/>
    <text x="660" y="58" font-family="sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="bold">Prod Approver</text>

    <!-- Key -->
    <text x="820" y="50" font-family="sans-serif" font-size="11" fill="#6b7280">Different individuals</text>
    <text x="820" y="66" font-family="sans-serif" font-size="11" fill="#6b7280">at each stage</text>
  </g>

  <!-- ===== FRAMEWORK BAR ===== -->
  <g transform="translate(40, 440)">
    <rect width="1120" height="48" rx="6" fill="rgba(0,255,136,0.03)" stroke="#21262d" stroke-width="1"/>

    <rect x="20" y="12" width="14" height="14" rx="3" fill="#00ff88" opacity="0.3"/>
    <text x="42" y="24" font-family="monospace" font-size="11" fill="#00ff88">FedRAMP</text>

    <rect x="142" y="12" width="14" height="14" rx="3" fill="#00d4ff" opacity="0.3"/>
    <text x="164" y="24" font-family="monospace" font-size="11" fill="#00d4ff">DoW IL4 / IL5</text>

    <rect x="310" y="12" width="14" height="14" rx="3" fill="#a855f7" opacity="0.3"/>
    <text x="332" y="24" font-family="monospace" font-size="11" fill="#a855f7">Agency ATO</text>

    <text x="510" y="24" font-family="monospace" font-size="10" fill="#6b7280">NIST 800-53 Rev 5</text>
    <text x="680" y="24" font-family="monospace" font-size="10" fill="#6b7280">FIPS 140 Encryption</text>
    <text x="870" y="24" font-family="monospace" font-size="10" fill="#6b7280">Pull-Based Architecture</text>
    <text x="1060" y="24" font-family="monospace" font-size="10" fill="#6b7280">ConMon</text>
  </g>

  <!-- ===== BOTTOM TITLE ===== -->
  <text x="600" y="530" font-family="sans-serif" font-size="20" fill="#e5e7eb" text-anchor="middle" font-weight="bold">Public Sector CI/CD Pipeline</text>
  <text x="600" y="556" font-family="sans-serif" font-size="15" fill="#6b7280" text-anchor="middle">GitHub / GitLab CI &#8594; Build + Scan &#8594; Manual Gate &#8594; Production</text>

  <!-- ===== BRANDING ===== -->
  <text x="600" y="590" font-family="monospace" font-size="11" fill="#21262d" text-anchor="middle">gooptimal.io</text>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#21262d" stroke-width="1"/>
</svg>